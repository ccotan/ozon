<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Маркетплейс</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    <i class="fas fa-store"></i>
                    <span>Маркетплейс</span>
                </a>
                <nav class="nav">
                    <a href="index.html" class="nav-link active">Главная</a>
                    <a href="catalog.html" class="nav-link">Каталог</a>
                    <a href="sellers.html" class="nav-link">Продавцы</a>
                </nav>
                <div class="header-actions">
                    <a href="login.html" class="btn btn-primary" id="loginBtn">
                        <i class="fas fa-user"></i> Войти
                    </a>
                    <a href="profile.html" class="btn btn-primary hidden" id="profileBtn">
                        <i class="fas fa-user-circle"></i> <span id="userName">Профиль</span>
                    </a>
                    <button class="icon-btn hidden" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="breadcrumbs">
        <div class="container">
            <a href="index.html">Главная</a>
        </div>
    </div>

    <main class="main">
        <div class="container">
            <section class="hero animate-on-scroll">
                <h1>Добро пожаловать на маркетплейс</h1>
                <p>Тысячи товаров от проверенных продавцов</p>
                <a href="catalog.html" class="btn btn-large">Перейти в каталог</a>
            </section>

            <section class="categories animate-on-scroll">
                <h2>Категории</h2>
                <div class="categories-grid" id="categoriesGrid"></div>
            </section>

            <section class="products animate-on-scroll">
                <h2>Популярные товары</h2>
                <div class="products-grid" id="productsGrid"></div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Маркетплейс. Все права защищены.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
