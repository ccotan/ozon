<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Маркетплейс</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Шапка -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    <i class="fas fa-store"></i>
                    <span>Маркетплейс</span>
                </a>
                
                <nav class="nav">
                    <a href="index.html" class="nav-link active">Главная</a>
                    <a href="catalog.html" class="nav-link">Каталог</a>
                    <a href="sellers.html" class="nav-link">Продавцы</a>
                </nav>
                
                <div class="header-actions">
                    <button class="icon-btn" id="searchToggle">
                        <i class="fas fa-search"></i>
                    </button>
                    <a href="login.html" class="btn btn-primary">
                        <i class="fas fa-user"></i>
                        Войти
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Хлебные крошки -->
    <div class="breadcrumbs">
        <div class="container">
            <a href="index.html">Главная</a>
        </div>
    </div>

    <!-- Основной контент -->
    <main class="main">
        <div class="container">
            <!-- Hero секция -->
            <section class="hero animate-on-scroll">
                <h1>Добро пожаловать на маркетплейс</h1>
                <p>Тысячи товаров от проверенных продавцов</p>
                <a href="catalog.html" class="btn btn-large">Перейти в каталог</a>
            </section>

            <!-- Категории -->
            <section class="categories animate-on-scroll">
                <h2>Категории</h2>
                <div class="categories-grid">
                    <a href="catalog.html?category=electronics" class="category-card">
                        <div class="category-icon">
                            <i class="fas fa-laptop"></i>
                        </div>
                        <span>Электроника</span>
                    </a>
                    <a href="catalog.html?category=clothing" class="category-card">
                        <div class="category-icon">
                            <i class="fas fa-tshirt"></i>
                        </div>
                        <span>Одежда</span>
                    </a>
                    <a href="catalog.html?category=home" class="category-card">
                        <div class="category-icon">
                            <i class="fas fa-home"></i>
                        </div>
                        <span>Для дома</span>
                    </a>
                    <a href="catalog.html?category=sports" class="category-card">
                        <div class="category-icon">
                            <i class="fas fa-running"></i>
                        </div>
                        <span>Спорт</span>
                    </a>
                </div>
            </section>

            <!-- Популярные товары -->
            <section class="products animate-on-scroll">
                <h2>Популярные товары</h2>
                <div class="products-grid" id="productsGrid">
                    <!-- Карточки товаров будут добавлены через JS -->
                </div>
            </section>
        </div>
    </main>

    <!-- Футер -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Маркетплейс. Все права защищены.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
