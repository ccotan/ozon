<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин продавца — Маркетплейс</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    <i class="fas fa-store"></i>
                    <span>Маркетплейс</span>
                </a>
                
                <nav class="nav">
                    <a href="index.html" class="nav-link">Главная</a>
                    <a href="catalog.html" class="nav-link">Каталог</a>
                    <a href="sellers.html" class="nav-link">Продавцы</a>
                </nav>
                
                <div class="header-actions">
                    <button class="icon-btn" id="chatBtn">
                        <i class="fas fa-comments"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="breadcrumbs">
        <div class="container">
            <a href="index.html">Главная</a>
            <span>›</span>
            <a href="sellers.html">Продавцы</a>
            <span>›</span>
            <span id="sellerName">Магазин</span>
        </div>
    </div>

    <main class="main">
        <div class="container">
            <div class="seller-header animate-on-scroll">
                <div class="seller-info">
                    <div class="seller-avatar">
                        <i class="fas fa-store"></i>
                    </div>
                    <div class="seller-details">
                        <h1 id="sellerTitle">Название магазина</h1>
                        <p id="sellerDescription">Описание магазина</p>
                        <div class="seller-stats">
                            <span><i class="fas fa-box"></i> <span id="sellerProductsCount">0</span> товаров</span>
                            <span><i class="fas fa-star"></i> <span id="sellerRating">0</span> рейтинг</span>
                        </div>
                    </div>
                </div>
                <button class="btn btn-primary" id="contactSellerBtn">
                    <i class="fas fa-envelope"></i>
                    Связаться с продавцом
                </button>
            </div>

            <section class="seller-products animate-on-scroll">
                <h2>Товары продавца</h2>
                <div class="products-grid" id="sellerProductsGrid">
                    <!-- Товары продавца -->
                </div>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
