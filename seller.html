<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин продавца — Ozon Minecraft</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo"><i class="fas fa-cube"></i><span>Ozon MC</span></a>
                <nav class="nav">
                    <a href="index.html" class="nav-link">Главная</a>
                    <a href="catalog.html" class="nav-link">Каталог</a>
                    <a href="sellers.html" class="nav-link">Продавцы</a>
                </nav>
                <div class="header-actions">
                    <a href="login.html" class="btn btn-primary" id="loginBtn"><i class="fas fa-user"></i> Войти</a>
                    <a href="profile.html" class="btn btn-primary hidden" id="profileBtn"><i class="fas fa-user-circle"></i> <span id="userName">Профиль</span></a>
                    <button class="icon-btn hidden" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </div>
    </header>
    <div class="breadcrumbs"><div class="container"><a href="index.html">Главная</a><span>›</span><a href="sellers.html">Продавцы</a><span>›</span><span id="sellerNameBc">Магазин</span></div></div>
    <main class="main">
        <div class="container">
            <div class="seller-profile-header" id="sellerProfileHeader">
                <div class="seller-profile-bg" id="sellerBg"></div>
                <div class="seller-profile-info">
                    <div class="seller-profile-avatar" id="sellerAvatar"><i class="fas fa-store"></i></div>
                    <div class="seller-profile-details">
                        <h1 id="sellerTitle">Название магазина</h1>
                        <p id="sellerBio">Описание магазина</p>
                    </div>
                    <button class="btn btn-danger" id="reportSellerBtn" style="margin-left: auto;"><i class="fas fa-flag"></i> Пожаловаться</button>
                </div>
            </div>
            <section class="products animate-on-scroll">
                <h2>Товары продавца</h2>
                <div class="products-grid" id="sellerProductsGrid"></div>
            </section>
        </div>
    </main>
    <footer class="footer"><div class="container"><p>&copy; 2026 Ozon Minecraft</p></div></footer>
    <script src="script.js"></script>
</body>
</html>
