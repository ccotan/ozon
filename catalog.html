<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог — Маркетплейс</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    <i class="fas fa-store"></i>
                    <span>Маркетплейс</span>
                </a>
                
                <nav class="nav">
                    <a href="index.html" class="nav-link">Главная</a>
                    <a href="catalog.html" class="nav-link active">Каталог</a>
                    <a href="sellers.html" class="nav-link">Продавцы</a>
                </nav>
                
                <div class="header-actions">
                    <button class="icon-btn" id="searchToggle">
                        <i class="fas fa-search"></i>
                    </button>
                    <a href="login.html" class="btn btn-primary" id="loginBtn">
                        <i class="fas fa-user"></i>
                        Войти
                    </a>
                    <a href="profile.html" class="btn btn-primary hidden" id="profileBtn">
                        <i class="fas fa-user-circle"></i>
                        <span id="userName">Профиль</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <div class="breadcrumbs">
        <div class="container">
            <a href="index.html">Главная</a>
            <span>›</span>
            <span>Каталог</span>
        </div>
    </div>

    <main class="main">
        <div class="container">
            <div class="catalog-layout">
                <aside class="sidebar">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Поиск товаров..." class="search-input">
                        <i class="fas fa-search search-icon"></i>
                    </div>

                    <div class="filter-section">
                        <h3>Категории</h3>
                        <div class="category-filters" id="categoryFilters">
                            <!-- Категории загружаются через JS -->
                        </div>
                    </div>

                    <div class="filter-section">
                        <h3>Цена</h3>
                        <div class="price-range">
                            <input type="number" id="minPrice" placeholder="От" class="price-input">
                            <input type="number" id="maxPrice" placeholder="До" class="price-input">
                        </div>
                    </div>

                    <button class="btn btn-primary btn-full" id="applyFilters">
                        <i class="fas fa-filter"></i>
                        Применить фильтры
                    </button>
                </aside>

                <div class="catalog-content">
                    <div class="catalog-header">
                        <h1>Каталог товаров</h1>
                        <div class="sort-controls">
                            <select id="sortSelect" class="sort-select">
                                <option value="popular">По популярности</option>
                                <option value="price-asc">Цена: по возрастанию</option>
                                <option value="price-desc">Цена: по убыванию</option>
                                <option value="name">По названию</option>
                            </select>
                        </div>
                    </div>

                    <div class="products-grid" id="productsGrid">
                        <!-- Товары загружаются через JS -->
                    </div>

                    <div class="pagination" id="pagination">
                        <!-- Пагинация -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Маркетплейс. Все права защищены.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
