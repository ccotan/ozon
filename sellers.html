<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Продавцы — Ozon Minecraft</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo"><i class="fas fa-cube"></i><span>Ozon MC</span></a>
                <div class="search-header">
                    <input type="text" id="headerSearch" placeholder="Поиск предметов Minecraft...">
                    <button class="search-btn" onclick="doHeaderSearch()"><i class="fas fa-search"></i></button>
                </div>
                <nav class="nav">
                    <a href="index.html" class="nav-link">Главная</a>
                    <a href="catalog.html" class="nav-link">Каталог</a>
                    <a href="sellers.html" class="nav-link active"><i class="fas fa-store"></i> Продавцы</a>
                    <a href="cart.html" class="nav-link"><i class="fas fa-shopping-cart"></i> Корзина <span id="cartCount" class="badge badge-admin" style="margin-left: 5px;">0</span></a>
                </nav>
                <div class="header-actions">
                    <a href="login.html" class="btn btn-primary" id="loginBtn"><i class="fas fa-user"></i> Войти</a>
                    <a href="profile.html" class="btn btn-primary hidden" id="profileBtn"><i class="fas fa-user-circle"></i> <span id="userName">Профиль</span></a>
                    <button class="icon-btn hidden" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </div>
    </header>
    <div class="breadcrumbs"><div class="container"><a href="index.html">Главная</a><span>›</span><span>Продавцы</span></div></div>
    <main class="main">
        <div class="container">
            <h1 style="font-size: 32px; margin-bottom: 30px; font-weight: 800;"><i class="fas fa-store" style="color: var(--color-lime);"></i> Продавцы</h1>
            <div class="sellers-grid" id="sellersGrid"></div>
        </div>
    </main>
    <footer class="footer"><div class="container"><p>&copy; 2026 Ozon Minecraft</p></div></footer>
    <script type="module" src="script.js"></script>
</body>
</html>
