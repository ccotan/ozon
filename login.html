<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Ozon Minecraft</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    <i class="fas fa-cube"></i>
                    <span>Ozon MC</span>
                </a>
            </div>
        </div>
    </header>

    <div class="breadcrumbs">
        <div class="container">
            <a href="index.html">Главная</a>
            <span>›</span>
            <span>Вход</span>
        </div>
    </div>

    <main class="main">
        <div class="container">
            <div class="auth-container animate-on-scroll">
                <div class="auth-card">
                    <h1><i class="fas fa-sign-in-alt"></i> Вход в аккаунт</h1>
                    <form id="loginForm" class="auth-form">
                        <div class="form-group">
                            <label for="loginEmail">Email или логин</label>
                            <div class="input-wrapper">
                                <i class="fas fa-envelope"></i>
                                <input type="text" id="loginEmail" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="loginPassword">Пароль</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="loginPassword" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="rememberMe">
                                <span>Запомнить меня</span>
                            </label>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">
                            <i class="fas fa-sign-in-alt"></i> Войти
                        </button>
                    </form>
                    <div class="auth-footer">
                        <p>Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
