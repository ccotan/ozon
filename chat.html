<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат — Ozon Minecraft</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo"><i class="fas fa-cube"></i><span>Ozon MC</span></a>
                <div class="header-actions">
                    <button class="icon-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </div>
    </header>
    <div class="breadcrumbs"><div class="container"><a href="index.html">Главная</a><span>›</span><span>Чат</span></div></div>
    <main class="main">
        <div class="container">
            <div class="chat-container">
                <div class="chat-header">
                    <i class="fas fa-comments"></i>
                    <span id="chatTitle">Чат</span>
                    <button class="btn btn-danger btn-small" id="reportChatBtn" style="margin-left: auto;"><i class="fas fa-flag"></i> Пожаловаться</button>
                </div>
                <div id="chatProductInfo" style="padding: 15px 25px; background: var(--bg-tertiary); border-bottom: 1px solid var(--color-border); display: none;">
                    <div style="display: flex; gap: 15px; align-items: center;">
                        <div id="chatProductImage" style="width: 60px; height: 60px; background: var(--bg-secondary); border-radius: var(--radius-xs); display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--color-lime); overflow: hidden;"></div>
                        <div style="flex: 1;">
                            <div id="chatProductTitle" style="font-weight: 700; color: var(--color-white);"></div>
                            <div id="chatProductPrice" style="color: var(--color-lime); font-weight: 700;"></div>
                        </div>
                    </div>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Введите сообщение..." class="chat-input">
                    <button class="btn btn-primary" id="sendMessageBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
