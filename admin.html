<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Маркетплейс</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    <i class="fas fa-shield-alt"></i>
                    <span>Админ-панель</span>
                </a>
                
                <div class="header-actions">
                    <button class="icon-btn" id="adminLogoutBtn">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="breadcrumbs">
        <div class="container">
            <a href="index.html">Главная</a>
            <span>›</span>
            <span>Админ-панель</span>
        </div>
    </div>

    <main class="main">
        <div class="container">
            <div class="admin-layout">
                <aside class="admin-sidebar">
                    <nav class="admin-nav">
                        <a href="#users" class="admin-nav-link active">
                            <i class="fas fa-users"></i>
                            Пользователи
                        </a>
                        <a href="#products" class="admin-nav-link">
                            <i class="fas fa-box"></i>
                            Товары
                        </a>
                        <a href="#categories" class="admin-nav-link">
                            <i class="fas fa-tags"></i>
                            Категории
                        </a>
                        <a href="#reports" class="admin-nav-link">
                            <i class="fas fa-flag"></i>
                            Жалобы
                        </a>
                    </nav>
                </aside>

                <div class="admin-content">
                    <section id="users" class="admin-section active">
                        <div class="section-header">
                            <h1>Пользователи</h1>
                            <button class="btn btn-primary" id="addUserBtn">
                                <i class="fas fa-user-plus"></i>
                                Добавить пользователя
                            </button>
                        </div>
                        <div class="table-container">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Имя</th>
                                        <th>Email</th>
                                        <th>Роль</th>
                                        <th>Действия</th>
                                    </tr>
                                </thead>
                                <tbody id="usersTableBody">
                                    <!-- Пользователи -->
                                </tbody>
                            </table>
                        </div>
                    </section>

                    <section id="products" class="admin-section">
                        <div class="section-header">
                            <h1>Товары</h1>
                            <button class="btn btn-primary" id="addProductBtn">
                                <i class="fas fa-plus"></i>
                                Добавить товар
                            </button>
                        </div>
                        <div class="table-container">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Название</th>
