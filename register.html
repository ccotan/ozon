<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Ozon Minecraft</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo"><i class="fas fa-cube"></i><span>Ozon MC</span></a>
            </div>
        </div>
    </header>
    <div class="breadcrumbs"><div class="container"><a href="index.html">Главная</a><span>›</span><span>Регистрация</span></div></div>
    
    <main class="main">
        <div class="container">
            <div class="auth-container animate-on-scroll">
                <div class="auth-card">
                    <h1><i class="fas fa-user-plus"></i> Регистрация</h1>
                    <form id="registerForm" class="auth-form">
                        <div class="form-group">
                            <label for="regName">Имя в Minecraft</label>
                            <div class="input-wrapper"><i class="fas fa-user"></i><input type="text" id="regName" required></div>
                        </div>
                        <div class="form-group">
                            <label for="regEmail">Email</label>
                            <div class="input-wrapper"><i class="fas fa-envelope"></i><input type="email" id="regEmail" required></div>
                        </div>
                        <div class="form-group">
                            <label for="regPassword">Пароль</label>
                            <div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="regPassword" required></div>
                            <small class="form-hint">Минимум 8 символов, 1 цифра, 1 заглавная буква</small>
                        </div>
                        <div class="form-group">
                            <label for="regPasswordConfirm">Подтвердите пароль</label>
                            <div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="regPasswordConfirm" required></div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full"><i class="fas fa-user-plus"></i> Зарегистрироваться</button>
                    </form>
                    <div class="auth-footer">
                        <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script type="module" src="auth.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
